<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <title>Login — Himal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--paper); }
    .login-box { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:40px; width:100%; max-width:380px; box-shadow:var(--shadow-lg); }
    .login-brand { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; margin-bottom:4px; }
    .login-brand span { color:var(--accent-light); }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-brand">Hi<span>mal</span></div>
  <div style="font-size:12px;color:var(--ink-light);margin-bottom:28px;text-transform:uppercase;letter-spacing:1px;">Print & Publishing</div>

  {% if error %}
  <div class="alert" style="background:var(--red-pale);color:var(--red);border:1px solid #f5c6c6;margin-bottom:16px;padding:10px 14px;border-radius:6px;font-size:13px;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="form-group" style="margin-bottom:16px;">
      <label>Username</label>
      <input type="text" name="username" required autofocus placeholder="Enter username">
    </div>
    <div class="form-group" style="margin-bottom:24px;">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Enter password">
    </div>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Login →</button>
  </form>
</div>
</body>
</html>
